<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Biểu Mẫu Liên Hệ</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #999;
            border-radius: 5px;
            font-size: 16px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Biểu Mẫu Liên Hệ</h2>

        <form id="contactForm">

            <!-- Tên -->
            <div class="form-group">

                <label for="name">Tên</label>

                <input type="text"
                    id="name"
                    placeholder="Nhập tên của bạn">

            </div>

            <!-- Email -->
            <div class="form-group">

                <label for="email">Email</label>

                <input type="email"
                    id="email"
                    placeholder="Nhập email của bạn">

            </div>

            <!-- Tin nhắn -->
            <div class="form-group">

                <label for="messageText">Tin nhắn</label>

                <textarea id="messageText"
                    placeholder="Nhập tin nhắn của bạn"></textarea>

            </div>

            <!-- Nút gửi -->
            <button type="submit">
                Gửi
            </button>

        </form>

        <!-- Thông báo -->
        <div id="message"></div>

    </div>

    <script>

        // Lấy form
        let form =
            document.getElementById("contactForm");

        // Bắt sự kiện submit
        form.addEventListener("submit", function(event) {

            // Ngăn form tải lại trang
            event.preventDefault();

            // Lấy dữ liệu
            let name =
                document.getElementById("name").value;

            let email =
                document.getElementById("email").value;

            let messageText =
                document.getElementById("messageText").value;

            let message =
                document.getElementById("message");

            // Kiểm tra dữ liệu rỗng
            if (
                name === "" ||
                email === "" ||
                messageText === ""
            ) {

                message.innerHTML =
                    "Vui lòng nhập đầy đủ thông tin!";

                message.style.color = "red";

            } else {

                message.innerHTML =
                    "Gửi biểu mẫu thành công!";

                message.style.color = "green";

            }

        });

    </script>

</body>

</html>
