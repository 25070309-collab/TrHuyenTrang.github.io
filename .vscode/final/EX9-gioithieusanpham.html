<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hệ Thống Đăng Ký Nhận Bản Tin</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 500px;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* CSS Grid Layout */
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #999;
            border-radius: 5px;
        }

        .radio-group,
        .checkbox-group {
            margin-top: 5px;
        }

        button {
            grid-column: span 2;
            padding: 12px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #message {
            grid-column: span 2;
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Đăng Ký Nhận Bản Tin</h2>

        <form id="newsletterForm">

            <!-- Họ tên -->
            <div class="full-width">

                <label for="fullname">
                    Tên đầy đủ
                </label>

                <input type="text"
                    id="fullname"
                    placeholder="Nhập họ tên">

            </div>

            <!-- Email -->
            <div class="full-width">

                <label for="email">
                    Email
                </label>

                <input type="email"
                    id="email"
                    placeholder="Nhập email">

            </div>

            <!-- Loại đăng ký -->
            <div class="full-width">

                <label>
                    Loại đăng ký
                </label>

                <div class="radio-group">

                    <input type="radio"
                        name="subscription"
                        value="monthly">
                    Hàng tháng

                    <br>
                    <input type="radio"
                        name="subscription"
                        value="yearly">
                    Hàng năm

                </div>

            </div>

            <!-- Sở thích -->
            <div class="full-width">

                <label>
                    Sở thích
                </label>

                <div class="checkbox-group">

                    <input type="checkbox"
                        class="interest"
                        value="technology">
                    Công nghệ

                    <br>

                    <input type="checkbox"
                        class="interest"
                        value="sports">
                    Thể thao

                    <br>

                    <input type="checkbox"
                        class="interest"
                        value="music">
                    Âm nhạc

                </div>

            </div>

            <!-- Nút gửi -->
            <button type="submit">
                Đăng ký
            </button>

            <!-- Thông báo -->
            <div id="message"></div>

        </form>

    </div>

    <script>

        // Lấy form
        let form =
            document.getElementById("newsletterForm");

        // Sự kiện submit
        form.addEventListener("submit", function(event) {

            // Ngăn tải lại trang
            event.preventDefault();

            // Lấy dữ liệu
            let fullname =
                document.getElementById("fullname").value;

            let email =
                document.getElementById("email").value;

            let message =
                document.getElementById("message");

            // Kiểm tra email
            let emailValid =
                email.includes("@") &&
                email.includes(".");

            // Kiểm tra checkbox
            let interests =
                document.querySelectorAll(".interest");

            let checked = false;

            interests.forEach(function(item) {

                if (item.checked) {

                    checked = true;

                }

            });

            // Validation
            if (
                fullname === "" ||
                email === ""
            ) {

                message.innerHTML =
                    "Vui lòng nhập đầy đủ thông tin!";

                message.style.color = "red";

            }
            else if (!emailValid) {

                message.innerHTML =
                    "Email không hợp lệ!";

                message.style.color = "red";

            }
            else if (!checked) {

                message.innerHTML =
                    "Vui lòng chọn ít nhất một sở thích!";

                message.style.color = "red";

            }
            else {

                message.innerHTML =
                    "Đăng ký thành công!";
                    message.style.color = "green";

            }

        });

    </script>

</body>

</html>
