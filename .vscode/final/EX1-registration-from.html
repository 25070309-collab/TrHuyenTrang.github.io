<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Registration </title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .container{
      width:400px;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    label{
      margin-bottom:5px;
      font-weight:bold;
    }

    input{
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:16px;
    }

    .message{
      font-size:14px;
      margin-top:5px;
    }

    .strength{
      font-weight:bold;
    }

    .weak{
      color:red;
    }

    .medium{
      color:orange;
    }

    .strong{
      color:green;
    }

    button{
      padding:12px;
      border:none;
      background:#007bff;
      color:white;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>User Registration</h2>

    <form id="registerForm">

      <!-- Username -->
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
        <div class="message" id="usernameMsg"></div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
        
        <div class="message strength" id="strengthText">
          Password Strength:
        </div>

        <div class="message" id="passwordMsg"></div>
      </div>

      <!-- Profile Picture -->
      <div class="form-group">
        <label>Profile Picture</label>
        <input type="file" id="profilePic" accept=".jpg,.jpeg,.png">
        <div class="message" id="fileMsg"></div>
      </div>

      <button type="submit">Register</button>

    </form>
  </div>

  <script>
    const form = document.getElementById("registerForm");

    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const profilePic = document.getElementById("profilePic");

    const usernameMsg = document.getElementById("usernameMsg");
    const passwordMsg = document.getElementById("passwordMsg");
    const fileMsg = document.getElementById("fileMsg");
    const strengthText = document.getElementById("strengthText");

    // PASSWORD STRENGTH CHECK
    password.addEventListener("input", () => {
      const value = password.value;

      let strength = "";

      if(value.length < 6){
        strength = "Weak";
        strengthText.className = "message strength weak";
      }
      else if(
        value.match(/[A-Za-z]/) &&
        value.match(/[0-9]/)
      ){
        if(value.length >= 10){
          strength = "Strong";
          strengthText.className = "message strength strong";
        }else{
          strength = "Medium";
          strengthText.className = "message strength medium";
        }
      }
      else{
        strength = "Weak";
        strengthText.className = "message strength weak";
      }

      strengthText.textContent = "Password Strength: " + strength;
    });

    // FORM VALIDATION
    form.addEventListener("submit", (e) => {
      e.preventDefault();

      let valid = true;

      // USERNAME VALIDATION
      if(username.value.length < 5 || username.value.length > 15){
        usernameMsg.textContent =
          "Username must be 5-15 characters";
        usernameMsg.style.color = "red";
        valid = false;
      }else{
        usernameMsg.textContent = "Valid username";
        usernameMsg.style.color = "green";
      }

      // PASSWORD VALIDATION
      const passwordPattern =
        /^(?=.*[A-Za-z])(?=.*\d).+$/;

      if(!passwordPattern.test(password.value)){
        passwordMsg.textContent =
          "Password must contain letters and numbers";
        passwordMsg.style.color = "red";
        valid = false;
      }else{
        passwordMsg.textContent = "Valid password";
        passwordMsg.style.color = "green";
      }

      // FILE VALIDATION
      const file = profilePic.files[0];

      if(file){
        const allowedTypes = [
          "image/jpeg",
          "image/png"
        ];

        if(!allowedTypes.includes(file.type)){
          fileMsg.textContent =
            "Only JPG or PNG files are allowed";
          fileMsg.style.color = "red";
          valid = false;
        }else{
          fileMsg.textContent = "Valid image file";
          fileMsg.style.color = "green";
        }
      }else{
        fileMsg.textContent = "Please upload an image";
        fileMsg.style.color = "red";
        valid = false;
      }

      // SUCCESS
      if(valid){
        alert("Registration Successful!");
      }
    });
  </script>

</body>
</html>
