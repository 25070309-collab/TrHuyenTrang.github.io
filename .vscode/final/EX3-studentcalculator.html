<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Grade Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f2f2f2;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th,
        td {
            border: 2px solid black;
            padding: 15px;
            text-align: center;
        }

        th {
            background-color: #333;
            color: white;
        }

        /* Alternating row colors */
        tr:nth-child(even) {
            background-color: #eeeeee;
        }

        tr:nth-child(odd) {
            background-color: #ffffff;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h2>Student Grade Calculator</h2>

    <!-- HTML Entities -->
    <p>
        Student System &reg; <br>
        Grade Scale: A &ge; 8 <br>
        Excellent Performance
    </p>

    <table>

        <tr>
            <th>Subject</th>
            <th>Grade</th>
        </tr>

        <tr>
            <td>Mathematics</td>
            <td class="grade">8</td>
        </tr>

        <tr>
            <td>Physics</td>
            <td class="grade">7</td>
        </tr>

        <tr>
            <td>Chemistry</td>
            <td class="grade">9</td>
        </tr>

        <tr>
            <td>English</td>
            <td class="grade">8</td>
        </tr>

    </table>

    <button onclick="calculateAverage()">
        Calculate Average
    </button>

    <div id="result"></div>

    <script>

        function calculateAverage() {

            let grades = document.querySelectorAll(".grade");

            let total = 0;

            grades.forEach(function (item) {

                total += Number(item.textContent);

            });

            let average = total / grades.length;

            document.getElementById("result").innerHTML =
                "Average Grade: " + average.toFixed(2);

        }

    </script>

</body>

</html>
